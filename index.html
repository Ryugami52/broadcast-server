<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BROADCAST // TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #00ff41; --green-dim: #00cc33; --green-dark: #003311; --green-mid: #00aa22;
    --bg: #0a0a0a; --bg2: #0d0d0d; --bg3: #111; --border: #1a3a1a;
    --text: #00ff41; --text-dim: #007a1f; --text-muted: #004d13;
    --red: #ff3333; --amber: #ffaa00; --cyan: #00ffff;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 14px; overflow: hidden; -webkit-tap-highlight-color: transparent; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px); pointer-events: none; z-index: 9999; }

  /* BOOT */
  #boot-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; font-family: 'VT323', monospace; font-size: 20px; }
  #boot-text { color: var(--green); width: 500px; max-width: 90vw; }
  #boot-text .line { opacity: 0; animation: fadeIn 0.1s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  /* APP */
  #app { display: none; height: 100vh; height: 100dvh; flex-direction: column; }

  /* TOPBAR */
  #topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; min-height: 44px; }
  #topbar .left { display: flex; align-items: center; gap: 8px; }
  #topbar .logo { font-family: 'VT323', monospace; font-size: 22px; color: var(--green); letter-spacing: 3px; }
  #topbar .status { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
  #topbar .user-info { font-size: 12px; color: var(--text-dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #menu-btn { display: none; background: transparent; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 4px 6px; min-width: 36px; min-height: 36px; align-items: center; justify-content: center; }
  #menu-btn:hover { color: var(--green); }

  /* MAIN */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 50; }
  #sidebar-overlay.open { display: block; }
  #sidebar { width: 200px; border-right: 1px solid var(--border); background: var(--bg2); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .sidebar-section { padding: 8px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 6px; padding: 4px; display: flex; align-items: center; justify-content: space-between; }
  .sidebar-add { cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 0 4px; transition: color 0.1s; }
  .sidebar-add:hover { color: var(--green); }
  .sidebar-item { padding: 8px; cursor: pointer; border-radius: 2px; font-size: 13px; color: var(--text-dim); transition: all 0.1s; display: flex; align-items: center; gap: 6px; min-height: 36px; position: relative; }
  .sidebar-item:hover { background: var(--green-dark); color: var(--green); }
  .sidebar-item.active { background: var(--green-dark); color: var(--green); border-left: 2px solid var(--green); }
  .sidebar-item .prefix { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }
  .sidebar-item .item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* unread badge on sidebar DM items */
  .unread-badge {
    background: var(--red);
    color: #fff;
    font-size: 9px;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .unread-badge.show { display: flex; }

  #online-list { padding: 8px; flex: 1; overflow-y: auto; }
  .online-user { padding: 6px 8px; font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; cursor: pointer; min-height: 32px; }
  .online-user:hover { color: var(--cyan); }
  .online-user .dot-sm { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

  /* JOIN ROOM MODAL */
  #room-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
  #room-modal.open { display: flex; }
  #room-modal-box { background: var(--bg2); border: 1px solid var(--border); padding: 20px; width: 300px; max-width: 90vw; }
  #room-modal-box h3 { font-family: 'VT323', monospace; font-size: 20px; color: var(--green); margin-bottom: 14px; }
  #room-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 14px; padding: 8px 10px; outline: none; margin-bottom: 10px; }
  #room-input:focus { border-color: var(--green); }
  .room-modal-btns { display: flex; gap: 8px; }
  .room-modal-btns button { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-dim); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 8px; cursor: pointer; transition: all 0.1s; }
  .room-modal-btns button.primary { border-color: var(--green); color: var(--green); }
  .room-modal-btns button:hover { background: var(--green-dark); }

  /* CHAT AREA */
  #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  #chat-header { padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); font-size: 12px; color: var(--text-dim); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; min-height: 40px; }
  #chat-header .channel { color: var(--green); font-size: 14px; }
  #messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; overscroll-behavior: contain; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: var(--bg); }
  #messages::-webkit-scrollbar-thumb { background: var(--border); }
  .msg { display: flex; gap: 8px; align-items: baseline; animation: msgIn 0.15s ease-out; line-height: 1.6; flex-wrap: wrap; }
  @keyframes msgIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }
  .msg .ts { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }
  .msg .sender { color: var(--green-mid); flex-shrink: 0; }
  .msg .sender.me { color: var(--cyan); }
  .msg .sender.system { color: var(--amber); }
  .msg .body { color: var(--text); word-break: break-word; min-width: 0; flex: 1; }
  .msg .body.system { color: var(--amber); font-style: italic; }
  .msg .body.join { color: var(--green-dim); font-style: italic; }
  .msg .body.leave { color: var(--red); font-style: italic; }
  .msg .body.private { color: var(--cyan); }
  .msg .body.room { color: var(--text); }
  .msg-divider { text-align: center; color: var(--text-muted); font-size: 11px; padding: 8px 0; border-top: 1px solid var(--border); margin: 4px 0; }

  /* INPUT */
  #input-area { padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  #input-prompt { color: var(--green); font-size: 16px; flex-shrink: 0; }
  #msg-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 14px; caret-color: var(--green); min-width: 0; }
  #msg-input::placeholder { color: var(--text-muted); }
  #send-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 6px 12px; cursor: pointer; transition: all 0.1s; flex-shrink: 0; min-height: 36px; }
  #send-btn:hover { border-color: var(--green); color: var(--green); }

  /* BOTTOM NAV */
  #bottom-nav { display: none; border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 8px; cursor: pointer; color: var(--text-muted); font-size: 10px; letter-spacing: 1px; border-top: 2px solid transparent; transition: all 0.1s; gap: 3px; position: relative; min-height: 52px; }
  .bnav-item.active { color: var(--green); border-top-color: var(--green); }
  .bnav-icon { font-size: 17px; line-height: 1; }
  .bnav-badge { position: absolute; top: 6px; right: calc(50% - 20px); background: var(--red); color: #fff; font-size: 9px; min-width: 14px; height: 14px; border-radius: 7px; display: none; align-items: center; justify-content: center; padding: 0 3px; }
  .bnav-badge.show { display: flex; }

  /* MOBILE PANEL */
  #mobile-panel { display: none; position: fixed; bottom: 52px; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); z-index: 40; max-height: 55vh; overflow-y: auto; padding: 12px; animation: slideUp 0.2s ease-out; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #mobile-panel .panel-item { padding: 10px 8px; font-size: 13px; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; cursor: pointer; }
  #mobile-panel .panel-item:hover { color: var(--green); }
  #mobile-panel .panel-label { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 8px; }
  #mobile-panel .panel-item .item-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 9px; min-width: 16px; height: 16px; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
  #mobile-panel .panel-item .item-badge.show { display: flex; }

  /* AUTH */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 500; padding: 16px; overflow-y: auto; }
  #auth-box { width: 480px; max-width: 100%; border: 1px solid var(--border); background: var(--bg2); padding: 28px 24px; }
  #auth-box h2 { font-family: 'VT323', monospace; font-size: 26px; color: var(--green); margin-bottom: 20px; letter-spacing: 2px; }
  .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .auth-tab { padding: 8px 20px; cursor: pointer; font-size: 13px; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.1s; min-height: 40px; display: flex; align-items: center; }
  .auth-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 6px; }
  .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 16px; padding: 10px 12px; outline: none; transition: border-color 0.1s; -webkit-appearance: none; border-radius: 0; }
  .form-input:focus { border-color: var(--green); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-error { font-size: 12px; color: var(--red); margin-top: 4px; display: none; }
  .auth-btn { width: 100%; background: var(--green-dark); border: 1px solid var(--green); color: var(--green); font-family: 'Share Tech Mono', monospace; font-size: 14px; padding: 12px; cursor: pointer; letter-spacing: 2px; transition: all 0.1s; margin-top: 8px; min-height: 44px; }
  .auth-btn:hover { background: var(--green); color: var(--bg); }
  #auth-error { color: var(--red); font-size: 12px; margin-top: 12px; display: none; padding: 8px; border: 1px solid var(--red); }
  #private-back { background: transparent; border: none; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; font-size: 12px; cursor: pointer; padding: 4px 8px; min-height: 32px; }
  #private-back:hover { color: var(--green); }

  .notification { position: fixed; bottom: 70px; right: 16px; left: auto; background: var(--bg2); border: 1px solid var(--cyan); color: var(--cyan); font-size: 12px; padding: 8px 14px; animation: notifIn 0.2s ease-out, notifOut 0.3s ease-in 3s forwards; z-index: 200; max-width: 280px; }
  @keyframes notifIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes notifOut { to { opacity: 0; transform: translateY(10px); } }

  /* MOBILE */
  @media (max-width: 640px) {
    #menu-btn { display: flex; }
    #sidebar { position: fixed; left: -220px; top: 0; bottom: 0; z-index: 60; transition: left 0.25s ease; width: 220px; }
    #sidebar.open { left: 0; }
    #bottom-nav { display: flex; }
    #topbar .status { display: none; }
    .msg .ts { display: none; }
    #msg-input { font-size: 16px; }
    .notification { bottom: 80px; right: 8px; left: 8px; max-width: none; }
    #mobile-panel { display: none; }
    #mobile-panel.open { display: block; }
    #messages { padding: 8px 10px; }
    #input-area { padding: 8px 10px; }
  }
</style>
</head>
<body>

<div id="boot-screen"><div id="boot-text"></div></div>

<div id="auth-screen">
  <div id="auth-box">
    <h2>// BROADCAST TERMINAL</h2>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">LOGIN</div>
      <div class="auth-tab" onclick="switchTab('register')">REGISTER</div>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">USERNAME</label>
        <input class="form-input" id="login-username" type="text" placeholder="enter username" autocomplete="off" autocorrect="off" autocapitalize="none">
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input class="form-input" id="login-password" type="password" placeholder="enter password">
      </div>
      <button class="auth-btn" onclick="doLogin()">[ AUTHENTICATE ]</button>
    </div>
    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label class="form-label">USERNAME (3-20 chars, no spaces)</label>
        <input class="form-input" id="reg-username" type="text" placeholder="choose username" autocomplete="off" autocorrect="off" autocapitalize="none">
        <div class="form-error" id="err-username"></div>
      </div>
      <div class="form-group">
        <label class="form-label">EMAIL OR PHONE</label>
        <input class="form-input" id="reg-contact" type="text" placeholder="user@example.com or 1234567890" autocorrect="off" autocapitalize="none">
        <div class="form-error" id="err-contact"></div>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD (min 6 chars)</label>
        <input class="form-input" id="reg-password" type="password" placeholder="choose password">
        <div class="form-error" id="err-password"></div>
      </div>
      <button class="auth-btn" onclick="doRegister()">[ CREATE ACCOUNT ]</button>
    </div>
    <div id="auth-error"></div>
  </div>
</div>

<!-- JOIN ROOM MODAL -->
<div id="room-modal">
  <div id="room-modal-box">
    <h3>// JOIN ROOM</h3>
    <input id="room-input" type="text" placeholder="room name (no spaces)" autocomplete="off" autocorrect="off" autocapitalize="none">
    <div class="room-modal-btns">
      <button onclick="closeRoomModal()">CANCEL</button>
      <button class="primary" onclick="submitJoinRoom()">JOIN</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="left">
      <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <div class="logo">BROADCAST//</div>
    </div>
    <div class="status"><div class="dot"></div><span id="status-text">CONNECTED</span></div>
    <div class="user-info" id="user-display"></div>
  </div>

  <div id="main">
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">
          CHANNELS
          <span class="sidebar-add" onclick="openRoomModal()" title="Join/create room">+</span>
        </div>
        <div class="sidebar-item active" id="tab-public" onclick="switchToPublic(); closeSidebar()">
          <span class="prefix">#</span><span class="item-label">public</span>
        </div>
        <div id="room-list"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">DIRECT</div>
        <div id="dm-list"></div>
      </div>
      <div id="online-list">
        <div class="sidebar-label">ONLINE</div>
        <div id="online-users"></div>
      </div>
    </div>

    <div id="chat-area">
      <div id="chat-header">
        <span class="channel" id="chat-title"># public</span>
        <button id="private-back" style="display:none;" onclick="switchToPublic()">[ back ]</button>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <span id="input-prompt">&gt;</span>
        <input id="msg-input" type="text" placeholder="type a message..." autocomplete="off" autocorrect="off" autocapitalize="none">
        <button id="send-btn" onclick="sendMessage()">SEND</button>
      </div>
    </div>
  </div>

  <div id="bottom-nav">
    <div class="bnav-item active" id="bnav-public" onclick="switchToPublic(); setActiveNav('public'); closeMobilePanel()">
      <span class="bnav-icon">#</span><span>PUBLIC</span>
    </div>
    <div class="bnav-item" id="bnav-rooms" onclick="toggleMobilePanel('rooms'); setActiveNav('rooms')">
      <span class="bnav-icon">*</span><span>ROOMS</span>
      <div class="bnav-badge" id="room-badge"></div>
    </div>
    <div class="bnav-item" id="bnav-dms" onclick="toggleMobilePanel('dms'); setActiveNav('dms')">
      <span class="bnav-icon">@</span><span>DMS</span>
      <div class="bnav-badge" id="dm-badge"></div>
    </div>
    <div class="bnav-item" id="bnav-online" onclick="toggleMobilePanel('online'); setActiveNav('online')">
      <span class="bnav-icon">.</span><span>ONLINE</span>
    </div>
  </div>

  <div id="mobile-panel"><div id="mobile-panel-content"></div></div>
</div>

<script>
const SERVER = 'wss://broadcast-server-production.up.railway.app/ws';

let ws = null;
let username = '';
let mode = 'public';       // 'public' | 'private' | 'room'
let privateTarget = '';
let currentRoom = '';
let publicHistory = [];
let privateHistories = {};  // user -> [{ts,sender,body,type}]
let roomHistories = {};     // room -> [{ts,sender,body,type}]
let dmUnread = {};          // user -> count
let roomUnread = {};        // room -> count
let onlineUsers = new Set();
let joinedRooms = new Set();
let authOKResolver = null;
let activeMobilePanel = null;

/* ── BOOT ── */
function boot() {
  const lines = ['> BROADCAST TERMINAL v2.0','> INITIALIZING SYSTEM...','> LOADING CRYPTO MODULE.......... OK','> CONNECTING TO NODE............. OK','> ESTABLISHING SECURE CHANNEL... OK','> ','> SYSTEM READY.'];
  const el = document.getElementById('boot-text');
  let i = 0;
  function next() {
    if (i >= lines.length) { setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; showAuth(); }, 500); return; }
    const d = document.createElement('div'); d.className = 'line'; d.textContent = lines[i]; el.appendChild(d);
    i++; setTimeout(next, i === lines.length ? 600 : 180);
  }
  next();
}

function showAuth() { document.getElementById('auth-screen').style.display = 'flex'; connectWS(); }

function connectWS() {
  ws = new WebSocket(SERVER);
  ws.onmessage = e => handleMessage(e.data);
  ws.onclose = () => {
    document.getElementById('status-text').textContent = 'DISCONNECTED';
    document.querySelector('.dot').style.cssText = 'background:var(--red);animation:none';
  };
}

/* ── MESSAGE HANDLER ── */
function handleMessage(data) {
  const t = new Date().toTimeString().slice(0,8);

  if (data.startsWith('AUTH_OK:')) {
    const p = data.split(':'); if (p.length >= 3 && authOKResolver) authOKResolver({ username: p[1], msg: p.slice(2).join(':') }); return;
  }
  if (data.startsWith('AUTH_FAIL:')) { showAuthError(data.slice(10)); if (authOKResolver) authOKResolver(null); return; }

  if (data.startsWith('SYSTEM:')) {
    const text = data.slice(7);
    if (text.startsWith('Online users:')) { text.slice(14).split(', ').filter(Boolean).forEach(u => onlineUsers.add(u)); renderOnlineUsers(); }
    appendMsg({ ts: t, sender: 'SYS', body: text, type: 'system' });
    return;
  }

  /* ── ROOM MESSAGES ── */
  if (data.startsWith('ROOM_HISTORY_START:')) {
    const room = data.slice(19);
    currentRoom = room; mode = 'room';
    renderChat();
    appendDivider('── #' + room + ' history ──');
    return;
  }
  if (data.startsWith('ROOM_HISTORY_END:')) { appendDivider('── live ──'); return; }
  if (data.startsWith('ROOM_JOINED:')) {
    const room = data.slice(12);
    currentRoom = room; mode = 'room';
    renderChat();
    appendDivider('── joined #' + room + ' ──');
    return;
  }
  if (data.startsWith('ROOM_MSG:')) {
    const parts = data.split(':'); if (parts.length < 3) return;
    const room = parts[1]; const content = parts.slice(2).join(':');
    const line = { ts: t, sender: '', body: content, type: 'room' };
    if (!roomHistories[room]) roomHistories[room] = [];
    roomHistories[room].push(line);
    if (mode === 'room' && currentRoom === room) {
      appendMsg(line);
    } else {
      if (!roomUnread[room]) roomUnread[room] = 0;
      roomUnread[room]++;
      updateRoomBadge(room);
      showNotification('[#' + room + '] ' + content);
    }
    return;
  }

  /* ── PRIVATE MESSAGES ── */
  if (data.startsWith('PRIVATE_FROM:')) {
    const parts = data.split(':'); if (parts.length < 3) return;
    const from = parts[1]; const msg = parts.slice(2).join(':');
    const line = { ts: t, sender: from, body: msg, type: 'private' };
    if (!privateHistories[from]) privateHistories[from] = [];
    privateHistories[from].push(line);
    addDMTab(from);
    if (mode === 'private' && privateTarget === from) {
      appendMsg(line);
    } else {
      if (!dmUnread[from]) dmUnread[from] = 0;
      dmUnread[from]++;
      updateDMBadge(from);
      showNotification('[PM from ' + from + ']: ' + msg);
    }
    return;
  }
  if (data.startsWith('PRIVATE_TO:')) {
    const parts = data.split(':'); if (parts.length < 3) return;
    const to = parts[1]; const msg = parts.slice(2).join(':');
    const line = { ts: t, sender: username + ' (you)', body: msg, type: 'me' };
    if (!privateHistories[to]) privateHistories[to] = [];
    privateHistories[to].push(line);
    if (mode === 'private' && privateTarget === to) appendMsg(line);
    return;
  }
  if (data.startsWith('PRIVATE_HISTORY:')) {
    const parts = data.split(':'); if (parts.length < 4) return;
    const sender = parts[1]; const ts = parts[2]; const msg = parts.slice(3).join(':');
    const isMe = sender === username;
    const line = { ts, sender: isMe ? username + ' (you)' : sender, body: msg, type: isMe ? 'me' : 'private' };
    if (!privateHistories[privateTarget]) privateHistories[privateTarget] = [];
    privateHistories[privateTarget].push(line);
    if (mode === 'private') appendMsg(line);
    return;
  }

  /* ── PUBLIC MESSAGES ── */
  if (data === '--- Last messages ---') { appendDivider('── history ──'); return; }
  if (data === '--- End of history ---') { appendDivider('── live ──'); return; }

  const isJoin = data.includes('has joined the chat') || data.includes('joined #');
  const isLeave = data.includes('has left the chat') || data.includes('has left.');
  const type = isJoin ? 'join' : isLeave ? 'leave' : 'public';

  if (isJoin && !data.includes('#')) { const u = data.split(' ')[0]; if (u !== username) { onlineUsers.add(u); renderOnlineUsers(); } }
  if (isLeave && !data.includes('#')) { const u = data.split(' ')[0]; onlineUsers.delete(u); renderOnlineUsers(); }

  const line = { ts: t, sender: '', body: data, type };
  publicHistory.push(line);
  if (mode === 'public') appendMsg(line);
}

/* ── RENDER ── */
function appendMsg(msg) {
  const el = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg';
  const ts = document.createElement('span'); ts.className = 'ts'; ts.textContent = msg.ts; div.appendChild(ts);
  if (msg.sender) {
    const s = document.createElement('span');
    s.className = 'sender ' + (msg.type === 'me' ? 'me' : msg.type === 'system' ? 'system' : '');
    s.textContent = '[' + msg.sender + ']'; div.appendChild(s);
  }
  const b = document.createElement('span'); b.className = 'body ' + msg.type; b.textContent = msg.body; div.appendChild(b);
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function appendDivider(text) {
  const el = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg-divider'; div.textContent = text;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function renderChat() {
  const el = document.getElementById('messages');
  el.innerHTML = '';
  document.getElementById('private-back').style.display = (mode !== 'public') ? 'block' : 'none';
  document.getElementById('tab-public').classList.toggle('active', mode === 'public');

  if (mode === 'public') {
    document.getElementById('chat-title').textContent = '# public';
    appendDivider('── public chat ──');
    publicHistory.forEach(m => appendMsg(m));
  } else if (mode === 'private') {
    document.getElementById('chat-title').textContent = '@ ' + privateTarget;
    appendDivider('── private chat with ' + privateTarget + ' ──');
    if (privateHistories[privateTarget]) privateHistories[privateTarget].forEach(m => appendMsg(m));
  } else if (mode === 'room') {
    document.getElementById('chat-title').textContent = '# ' + currentRoom;
    appendDivider('── room: #' + currentRoom + ' ──');
    if (roomHistories[currentRoom]) roomHistories[currentRoom].forEach(m => appendMsg(m));
  }
  el.scrollTop = el.scrollHeight;
  updateAllSidebarActive();
}

function updateAllSidebarActive() {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (mode === 'public') document.getElementById('tab-public').classList.add('active');
  else if (mode === 'room' && document.getElementById('room-' + currentRoom)) document.getElementById('room-' + currentRoom).classList.add('active');
  else if (mode === 'private' && document.getElementById('dm-' + privateTarget)) document.getElementById('dm-' + privateTarget).classList.add('active');
}

/* ── ONLINE USERS ── */
function renderOnlineUsers() {
  const el = document.getElementById('online-users'); el.innerHTML = '';
  onlineUsers.forEach(u => {
    const d = document.createElement('div'); d.className = 'online-user';
    d.innerHTML = '<div class="dot-sm"></div>' + u;
    d.onclick = () => { openPrivate(u); closeSidebar(); };
    el.appendChild(d);
  });
}

/* ── ROOMS ── */
function openRoomModal() { document.getElementById('room-modal').classList.add('open'); document.getElementById('room-input').focus(); }
function closeRoomModal() { document.getElementById('room-modal').classList.remove('open'); document.getElementById('room-input').value = ''; }
function submitJoinRoom() {
  const name = document.getElementById('room-input').value.trim().replace(/\s+/g, '-').toLowerCase();
  if (!name) return;
  ws.send('JOINROOM:' + name);
  joinedRooms.add(name);
  addRoomTab(name);
  closeRoomModal();
  closeSidebar();
}

document.getElementById('room-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitJoinRoom(); if (e.key === 'Escape') closeRoomModal(); });

function addRoomTab(room) {
  if (document.getElementById('room-' + room)) return;
  const list = document.getElementById('room-list');
  const div = document.createElement('div'); div.className = 'sidebar-item'; div.id = 'room-' + room;
  div.innerHTML = '<span class="prefix">#</span><span class="item-label">' + room + '</span><span class="unread-badge" id="rb-' + room + '"></span>';
  div.onclick = () => { switchToRoom(room); closeSidebar(); };
  list.appendChild(div);
}

function switchToRoom(room) {
  mode = 'room'; currentRoom = room;
  privateTarget = '';
  // Clear unread for this room
  roomUnread[room] = 0;
  updateRoomBadge(room);
  renderChat();
  // Request history if first time
  if (!roomHistories[room] || roomHistories[room].length === 0) {
    ws.send('JOINROOM:' + room);
  }
  closeMobilePanel();
  setActiveNav('rooms');
}

function updateRoomBadge(room) {
  const count = roomUnread[room] || 0;
  const badge = document.getElementById('rb-' + room);
  if (badge) { badge.textContent = count > 0 ? count : ''; badge.classList.toggle('show', count > 0); }
  // Update bottom nav badge
  const total = Object.values(roomUnread).reduce((a, b) => a + b, 0);
  const nb = document.getElementById('room-badge');
  if (nb) { nb.textContent = total > 0 ? total : ''; nb.classList.toggle('show', total > 0); }
}

/* ── DMs ── */
function addDMTab(user) {
  if (document.getElementById('dm-' + user)) return;
  const list = document.getElementById('dm-list');
  const div = document.createElement('div'); div.className = 'sidebar-item'; div.id = 'dm-' + user;
  div.innerHTML = '<span class="prefix">@</span><span class="item-label">' + user + '</span><span class="unread-badge" id="ub-' + user + '"></span>';
  div.onclick = () => { openPrivate(user); closeSidebar(); };
  list.appendChild(div);
}

function updateDMBadge(user) {
  const count = dmUnread[user] || 0;
  const badge = document.getElementById('ub-' + user);
  if (badge) { badge.textContent = count > 0 ? count : ''; badge.classList.toggle('show', count > 0); }
  // Update bottom nav
  const total = Object.values(dmUnread).reduce((a, b) => a + b, 0);
  const nb = document.getElementById('dm-badge');
  if (nb) { nb.textContent = total > 0 ? total : ''; nb.classList.toggle('show', total > 0); }
}

function openPrivate(target) {
  mode = 'private'; privateTarget = target; currentRoom = '';
  dmUnread[target] = 0; updateDMBadge(target);
  addDMTab(target);
  renderChat();
  ws.send('HISTORY:' + target);
  closeMobilePanel();
  setActiveNav('dms');
}

function switchToPublic() {
  mode = 'public'; privateTarget = ''; currentRoom = '';
  renderChat();
  closeMobilePanel();
  setActiveNav('public');
}

/* ── SEND ── */
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim(); if (!text || !ws) return;
  input.value = '';

  if (text === '/list') { ws.send('LIST:'); return; }
  if (text === '/listrooms') { ws.send('LISTROOMS:'); return; }
  if (text.startsWith('/room ')) { const r = text.slice(6).trim(); if (r) { joinedRooms.add(r); addRoomTab(r); ws.send('JOINROOM:' + r); } return; }
  if (text.startsWith('/msg ')) { const u = text.slice(5).trim(); if (u) openPrivate(u); return; }
  if (text === '/exit') { switchToPublic(); return; }

  if (mode === 'private') { ws.send('PRIVATE:' + privateTarget + ':' + text); }
  else { ws.send('[' + username + ']: ' + text); }
}

document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

/* ── SIDEBAR / NAV ── */
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

function setActiveNav(tab) {
  document.querySelectorAll('.bnav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('bnav-' + tab); if (el) el.classList.add('active');
}

function toggleMobilePanel(type) {
  const panel = document.getElementById('mobile-panel');
  const content = document.getElementById('mobile-panel-content');
  if (activeMobilePanel === type && panel.classList.contains('open')) { closeMobilePanel(); return; }
  activeMobilePanel = type; content.innerHTML = '';

  if (type === 'rooms') {
    const label = document.createElement('div'); label.className = 'panel-label'; label.textContent = 'ROOMS'; content.appendChild(label);
    const joinBtn = document.createElement('div'); joinBtn.className = 'panel-item';
    joinBtn.innerHTML = '<span style="color:var(--green)">+</span> join / create room';
    joinBtn.onclick = () => { closeMobilePanel(); openRoomModal(); };
    content.appendChild(joinBtn);
    joinedRooms.forEach(room => {
      const item = document.createElement('div'); item.className = 'panel-item';
      const unread = roomUnread[room] || 0;
      item.innerHTML = '<span style="color:var(--text-muted)">#</span> ' + room + '<span class="item-badge' + (unread > 0 ? ' show' : '') + '">' + (unread > 0 ? unread : '') + '</span>';
      item.onclick = () => switchToRoom(room);
      content.appendChild(item);
    });
    if (joinedRooms.size === 0) {
      const empty = document.createElement('div'); empty.style.cssText = 'color:var(--text-muted);font-size:12px;padding:8px;';
      empty.textContent = 'No rooms yet. Tap + to join one.'; content.appendChild(empty);
    }
  }

  if (type === 'dms') {
    const label = document.createElement('div'); label.className = 'panel-label'; label.textContent = 'DIRECT MESSAGES'; content.appendChild(label);
    const users = Object.keys(privateHistories);
    if (users.length === 0) {
      const empty = document.createElement('div'); empty.style.cssText = 'color:var(--text-muted);font-size:12px;padding:8px;';
      empty.textContent = 'No DMs yet. Tap a user in ONLINE.'; content.appendChild(empty);
    }
    users.forEach(user => {
      const item = document.createElement('div'); item.className = 'panel-item';
      const unread = dmUnread[user] || 0;
      item.innerHTML = '<span style="color:var(--text-muted)">@</span> ' + user + '<span class="item-badge' + (unread > 0 ? ' show' : '') + '">' + (unread > 0 ? unread : '') + '</span>';
      item.onclick = () => openPrivate(user);
      content.appendChild(item);
    });
  }

  if (type === 'online') {
    const label = document.createElement('div'); label.className = 'panel-label'; label.textContent = 'ONLINE USERS'; content.appendChild(label);
    onlineUsers.forEach(u => {
      const item = document.createElement('div'); item.className = 'panel-item';
      item.innerHTML = '<div class="dot-sm" style="width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;"></div>' + u;
      item.onclick = () => openPrivate(u);
      content.appendChild(item);
    });
  }

  panel.classList.add('open');
}

function closeMobilePanel() { activeMobilePanel = null; document.getElementById('mobile-panel').classList.remove('open'); }

document.addEventListener('click', e => {
  const panel = document.getElementById('mobile-panel'); const bnav = document.getElementById('bottom-nav');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !bnav.contains(e.target)) closeMobilePanel();
  const modal = document.getElementById('room-modal');
  if (modal.classList.contains('open') && e.target === modal) closeRoomModal();
});

/* ── AUTH ── */
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((el, i) => el.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';
  document.getElementById('auth-error').style.display = 'none';
}
function showAuthError(msg) { const el = document.getElementById('auth-error'); el.textContent = '> ERROR: ' + msg; el.style.display = 'block'; }
function validateUsername(u) { if (u.length<3) return 'Min 3 chars'; if (u.length>20) return 'Max 20 chars'; if (/\s/.test(u)) return 'No spaces'; return null; }
function validateContact(c) {
  if (c.includes('@')) { if (c.length>254||/\s/.test(c)) return 'Invalid email'; const p=c.split('@'); if (p.length!==2||!p[0]||!p[1].includes('.')) return 'Invalid email'; return null; }
  else { if (!/^\d{7,15}$/.test(c)) return 'Digits only, 7-15'; return null; }
}
function waitForAuth() { return new Promise(resolve => { authOKResolver = resolve; }); }

async function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  if (!u||!p) { showAuthError('Fill in all fields'); return; }
  document.getElementById('auth-error').style.display = 'none';
  ws.send('LOGIN:' + u + ':' + p);
  const result = await waitForAuth();
  if (result) enterChat(result.username, result.msg);
}

async function doRegister() {
  const u = document.getElementById('reg-username').value.trim();
  const c = document.getElementById('reg-contact').value.trim();
  const p = document.getElementById('reg-password').value;
  const uErr = validateUsername(u); const cErr = validateContact(c); const pErr = p.length<6?'Min 6 chars':null;
  document.getElementById('err-username').textContent = uErr||''; document.getElementById('err-username').style.display = uErr?'block':'none';
  document.getElementById('err-contact').textContent = cErr||''; document.getElementById('err-contact').style.display = cErr?'block':'none';
  document.getElementById('err-password').textContent = pErr||''; document.getElementById('err-password').style.display = pErr?'block':'none';
  if (uErr||cErr||pErr) return;
  ws.send('REGISTER:' + u + ':' + c + ':' + p);
  const result = await waitForAuth();
  if (result) enterChat(result.username, result.msg);
}

function enterChat(uname, welcomeMsg) {
  username = uname; authOKResolver = null;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-display').textContent = '[ ' + username + ' ]';
  onlineUsers.add(username); renderOnlineUsers();
  ws.send('LIST:');
  appendDivider('── connected as ' + username + ' ──');
  document.getElementById('msg-input').focus();
}

function showNotification(msg) {
  const el = document.createElement('div'); el.className = 'notification'; el.textContent = msg;
  document.body.appendChild(el); setTimeout(() => el.remove(), 3500);
}

boot();
</script>
