<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BROADCAST // TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-dark: #003311;
    --green-mid: #00aa22;
    --bg: #0a0a0a;
    --bg2: #0d0d0d;
    --bg3: #111;
    --border: #1a3a1a;
    --text: #00ff41;
    --text-dim: #007a1f;
    --text-muted: #004d13;
    --red: #ff3333;
    --amber: #ffaa00;
    --cyan: #00ffff;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* BOOT */
  #boot-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-family: 'VT323', monospace;
    font-size: 20px;
  }
  #boot-text { color: var(--green); width: 500px; max-width: 90vw; }
  #boot-text .line { opacity: 0; animation: fadeIn 0.1s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  /* APP SHELL */
  #app { display: none; height: 100vh; height: 100dvh; flex-direction: column; }

  /* TOPBAR */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    min-height: 44px;
  }
  #topbar .left { display: flex; align-items: center; gap: 8px; }
  #topbar .logo { font-family: 'VT323', monospace; font-size: 22px; color: var(--green); letter-spacing: 3px; }
  #topbar .status { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
  #topbar .user-info { font-size: 12px; color: var(--text-dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #menu-btn {
    display: none;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    min-width: 36px;
    min-height: 36px;
    align-items: center;
    justify-content: center;
  }
  #menu-btn:hover { color: var(--green); }

  /* MAIN AREA */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
  }
  #sidebar-overlay.open { display: block; }

  #sidebar {
    width: 200px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-section { padding: 8px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 6px; padding: 4px; }
  .sidebar-item {
    padding: 8px 8px;
    cursor: pointer;
    border-radius: 2px;
    font-size: 13px;
    color: var(--text-dim);
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 36px;
  }
  .sidebar-item:hover { background: var(--green-dark); color: var(--green); }
  .sidebar-item.active { background: var(--green-dark); color: var(--green); border-left: 2px solid var(--green); }
  .sidebar-item .prefix { color: var(--text-muted); font-size: 11px; }
  #online-list { padding: 8px; flex: 1; overflow-y: auto; }
  .online-user {
    padding: 6px 8px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    min-height: 32px;
  }
  .online-user:hover { color: var(--cyan); }
  .online-user .dot-sm { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

  /* CHAT AREA */
  #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  #chat-header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    min-height: 40px;
  }
  #chat-header .channel { color: var(--green); font-size: 14px; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overscroll-behavior: contain;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: var(--bg); }
  #messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg {
    display: flex;
    gap: 8px;
    align-items: baseline;
    animation: msgIn 0.15s ease-out;
    line-height: 1.6;
    flex-wrap: wrap;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }
  .msg .ts { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }
  .msg .sender { color: var(--green-mid); flex-shrink: 0; }
  .msg .sender.me { color: var(--cyan); }
  .msg .sender.system { color: var(--amber); }
  .msg .body { color: var(--text); word-break: break-word; min-width: 0; flex: 1; }
  .msg .body.system { color: var(--amber); font-style: italic; }
  .msg .body.join { color: var(--green-dim); font-style: italic; }
  .msg .body.leave { color: var(--red); font-style: italic; }
  .msg .body.private { color: var(--cyan); }
  .msg-divider { text-align: center; color: var(--text-muted); font-size: 11px; padding: 8px 0; border-top: 1px solid var(--border); margin: 4px 0; }

  /* INPUT */
  #input-area {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  #input-prompt { color: var(--green); font-size: 16px; flex-shrink: 0; }
  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    caret-color: var(--green);
    min-width: 0;
  }
  #msg-input::placeholder { color: var(--text-muted); }
  #send-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.1s;
    flex-shrink: 0;
    min-height: 36px;
  }
  #send-btn:hover { border-color: var(--green); color: var(--green); }

  /* BOTTOM NAV (mobile only) */
  #bottom-nav {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .bnav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 1px;
    border-top: 2px solid transparent;
    transition: all 0.1s;
    gap: 3px;
    position: relative;
    min-height: 52px;
  }
  .bnav-item.active { color: var(--green); border-top-color: var(--green); }
  .bnav-icon { font-size: 17px; line-height: 1; }
  .bnav-badge {
    position: absolute;
    top: 6px;
    right: calc(50% - 20px);
    background: var(--red);
    color: #fff;
    font-size: 9px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .bnav-badge.show { display: flex; }

  /* MOBILE SLIDE PANEL */
  #mobile-panel {
    display: none;
    position: fixed;
    bottom: 52px;
    left: 0;
    right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    z-index: 40;
    max-height: 55vh;
    overflow-y: auto;
    padding: 12px;
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #mobile-panel .panel-item {
    padding: 10px 8px;
    font-size: 13px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  #mobile-panel .panel-item:hover { color: var(--green); }
  #mobile-panel .panel-label { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 8px; }

  /* AUTH SCREEN */
  #auth-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 500;
    padding: 16px;
    overflow-y: auto;
  }
  #auth-box {
    width: 480px;
    max-width: 100%;
    border: 1px solid var(--border);
    background: var(--bg2);
    padding: 28px 24px;
  }
  #auth-box h2 {
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: var(--green);
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .auth-tab {
    padding: 8px 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.1s;
    min-height: 40px;
    display: flex;
    align-items: center;
  }
  .auth-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 6px; }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.1s;
    -webkit-appearance: none;
    border-radius: 0;
  }
  .form-input:focus { border-color: var(--green); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-error { font-size: 12px; color: var(--red); margin-top: 4px; display: none; }
  .auth-btn {
    width: 100%;
    background: var(--green-dark);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 12px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.1s;
    margin-top: 8px;
    min-height: 44px;
  }
  .auth-btn:hover { background: var(--green); color: var(--bg); }
  #auth-error { color: var(--red); font-size: 12px; margin-top: 12px; display: none; padding: 8px; border: 1px solid var(--red); }

  #private-back {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    min-height: 32px;
  }
  #private-back:hover { color: var(--green); }

  .notification {
    position: fixed;
    bottom: 70px;
    right: 16px;
    left: auto;
    background: var(--bg2);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-size: 12px;
    padding: 8px 14px;
    animation: notifIn 0.2s ease-out, notifOut 0.3s ease-in 3s forwards;
    z-index: 200;
    max-width: 280px;
  }
  @keyframes notifIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes notifOut { to { opacity: 0; transform: translateY(10px); } }

  /* MOBILE BREAKPOINT */
  @media (max-width: 640px) {
    #menu-btn { display: flex; }

    #sidebar {
      position: fixed;
      left: -220px;
      top: 0;
      bottom: 0;
      z-index: 60;
      transition: left 0.25s ease;
      width: 220px;
    }
    #sidebar.open { left: 0; }

    #bottom-nav { display: flex; }

    #topbar .status { display: none; }

    .msg .ts { display: none; }

    #msg-input { font-size: 16px; }

    .notification {
      bottom: 80px;
      right: 8px;
      left: 8px;
      max-width: none;
    }

    #mobile-panel { display: none; }
    #mobile-panel.open { display: block; }

    #messages { padding: 8px 10px; }
    #input-area { padding: 8px 10px; }
  }
</style>
</head>
<body>

<div id="boot-screen">
  <div id="boot-text"></div>
</div>

<div id="auth-screen">
  <div id="auth-box">
    <h2>// BROADCAST TERMINAL</h2>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">LOGIN</div>
      <div class="auth-tab" onclick="switchTab('register')">REGISTER</div>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label class="form-label">USERNAME</label>
        <input class="form-input" id="login-username" type="text" placeholder="enter username" autocomplete="off" autocorrect="off" autocapitalize="none">
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input class="form-input" id="login-password" type="password" placeholder="enter password">
      </div>
      <button class="auth-btn" onclick="doLogin()">[ AUTHENTICATE ]</button>
    </div>

    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label class="form-label">USERNAME (3-20 chars, no spaces)</label>
        <input class="form-input" id="reg-username" type="text" placeholder="choose username" autocomplete="off" autocorrect="off" autocapitalize="none">
        <div class="form-error" id="err-username"></div>
      </div>
      <div class="form-group">
        <label class="form-label">EMAIL OR PHONE</label>
        <input class="form-input" id="reg-contact" type="text" placeholder="user@example.com or 1234567890" autocorrect="off" autocapitalize="none">
        <div class="form-error" id="err-contact"></div>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD (min 6 chars)</label>
        <input class="form-input" id="reg-password" type="password" placeholder="choose password">
        <div class="form-error" id="err-password"></div>
      </div>
      <button class="auth-btn" onclick="doRegister()">[ CREATE ACCOUNT ]</button>
    </div>

    <div id="auth-error"></div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="left">
      <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <div class="logo">BROADCAST//</div>
    </div>
    <div class="status">
      <div class="dot"></div>
      <span id="status-text">CONNECTED</span>
    </div>
    <div class="user-info" id="user-display"></div>
  </div>

  <div id="main">
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">CHANNELS</div>
        <div class="sidebar-item active" id="tab-public" onclick="switchToPublic(); closeSidebar()">
          <span class="prefix">#</span> public
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">DIRECT</div>
        <div id="dm-list"></div>
      </div>
      <div id="online-list">
        <div class="sidebar-label">ONLINE</div>
        <div id="online-users"></div>
      </div>
    </div>

    <div id="chat-area">
      <div id="chat-header">
        <span class="channel" id="chat-title"># public</span>
        <button id="private-back" style="display:none;" onclick="switchToPublic()">[ back ]</button>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <span id="input-prompt">&gt;</span>
        <input id="msg-input" type="text" placeholder="type a message..." autocomplete="off" autocorrect="off" autocapitalize="none">
        <button id="send-btn" onclick="sendMessage()">SEND</button>
      </div>
    </div>
  </div>

  <div id="bottom-nav">
    <div class="bnav-item active" id="bnav-public" onclick="switchToPublic(); setActiveNav('public'); closeMobilePanel()">
      <span class="bnav-icon">#</span>
      <span>PUBLIC</span>
    </div>
    <div class="bnav-item" id="bnav-dms" onclick="toggleMobilePanel('dms'); setActiveNav('dms')">
      <span class="bnav-icon">@</span>
      <span>DMS</span>
      <div class="bnav-badge" id="dm-badge"></div>
    </div>
    <div class="bnav-item" id="bnav-online" onclick="toggleMobilePanel('online'); setActiveNav('online')">
      <span class="bnav-icon">*</span>
      <span>ONLINE</span>
    </div>
  </div>

  <div id="mobile-panel">
    <div id="mobile-panel-content"></div>
  </div>
</div>

<script>
const SERVER = 'wss://broadcast-server-production.up.railway.app/ws';

let ws = null;
let username = '';
let mode = 'public';
let privateTarget = '';
let publicHistory = [];
let privateHistories = {};
let onlineUsers = new Set();
let authOKResolver = null;
let dmUnread = 0;
let activeMobilePanel = null;

function boot() {
  const lines = [
    '> BROADCAST TERMINAL v2.0',
    '> INITIALIZING SYSTEM...',
    '> LOADING CRYPTO MODULE.......... OK',
    '> CONNECTING TO NODE............. OK',
    '> ESTABLISHING SECURE CHANNEL... OK',
    '> ',
    '> SYSTEM READY.',
  ];
  const el = document.getElementById('boot-text');
  let i = 0;
  function nextLine() {
    if (i >= lines.length) {
      setTimeout(() => {
        document.getElementById('boot-screen').style.display = 'none';
        showAuth();
      }, 500);
      return;
    }
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = lines[i];
    el.appendChild(div);
    i++;
    setTimeout(nextLine, i === lines.length ? 600 : 180);
  }
  nextLine();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  connectWS();
}

function connectWS() {
  ws = new WebSocket(SERVER);
  ws.onopen = () => {};
  ws.onmessage = (e) => handleMessage(e.data);
  ws.onclose = () => {
    document.getElementById('status-text').textContent = 'DISCONNECTED';
    document.querySelector('.dot').style.background = 'var(--red)';
    document.querySelector('.dot').style.animation = 'none';
  };
}

function handleMessage(data) {
  const t = new Date().toTimeString().slice(0,8);

  if (data.startsWith('AUTH_OK:')) {
    const parts = data.split(':');
    if (parts.length >= 3 && authOKResolver) {
      authOKResolver({ username: parts[1], msg: parts.slice(2).join(':') });
    }
    return;
  }

  if (data.startsWith('AUTH_FAIL:')) {
    showAuthError(data.slice(10));
    if (authOKResolver) authOKResolver(null);
    return;
  }

  if (data.startsWith('SYSTEM:')) {
    const text = data.slice(7);
    if (text.startsWith('Online users:')) {
      const users = text.slice(14).split(', ').filter(Boolean);
      users.forEach(u => onlineUsers.add(u));
      renderOnlineUsers();
    }
    appendMsg({ ts: t, sender: 'SYS', body: text, type: 'system' }, 'public');
    return;
  }

  if (data.startsWith('PRIVATE_FROM:')) {
    const parts = data.split(':');
    if (parts.length >= 3) {
      const from = parts[1];
      const msg = parts.slice(2).join(':');
      const line = { ts: t, sender: from, body: msg, type: 'private' };
      if (!privateHistories[from]) privateHistories[from] = [];
      privateHistories[from].push(line);
      addDMTab(from);
      if (mode === 'private' && privateTarget === from) {
        appendMsg(line, 'private');
      } else {
        showNotification('[PM from ' + from + ']: ' + msg);
        dmUnread++;
        const badge = document.getElementById('dm-badge');
        badge.textContent = dmUnread;
        badge.classList.add('show');
      }
    }
    return;
  }

  if (data.startsWith('PRIVATE_TO:')) {
    const parts = data.split(':');
    if (parts.length >= 3) {
      const to = parts[1];
      const msg = parts.slice(2).join(':');
      const line = { ts: t, sender: username + ' (you)', body: msg, type: 'me' };
      if (!privateHistories[to]) privateHistories[to] = [];
      privateHistories[to].push(line);
      if (mode === 'private' && privateTarget === to) appendMsg(line, 'private');
    }
    return;
  }

  if (data.startsWith('PRIVATE_HISTORY:')) {
    const parts = data.split(':');
    if (parts.length >= 4) {
      const sender = parts[1];
      const ts = parts[2];
      const msg = parts.slice(3).join(':');
      const isMe = sender === username;
      const line = { ts, sender: isMe ? username + ' (you)' : sender, body: msg, type: isMe ? 'me' : 'private' };
      if (!privateHistories[privateTarget]) privateHistories[privateTarget] = [];
      privateHistories[privateTarget].push(line);
      appendMsg(line, 'private');
    }
    return;
  }

  if (data === '--- Last messages ---') { appendDivider('── history ──'); return; }
  if (data === '--- End of history ---') { appendDivider('── live ──'); return; }

  const isJoin = data.includes('has joined the chat');
  const isLeave = data.includes('has left the chat');
  const type = isJoin ? 'join' : isLeave ? 'leave' : 'public';

  if (isJoin) { const u = data.split(' ')[0]; if (u !== username) { onlineUsers.add(u); renderOnlineUsers(); } }
  if (isLeave) { const u = data.split(' ')[0]; onlineUsers.delete(u); renderOnlineUsers(); }

  const line = { ts: t, sender: '', body: data, type };
  publicHistory.push(line);
  if (mode === 'public') appendMsg(line, 'public');
}

function appendMsg(msg, target) {
  if (target && target !== mode && !(target === 'private' && mode === 'private')) return;
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  const ts = document.createElement('span');
  ts.className = 'ts';
  ts.textContent = msg.ts;
  div.appendChild(ts);
  if (msg.sender) {
    const sender = document.createElement('span');
    sender.className = 'sender ' + (msg.type === 'me' ? 'me' : msg.type === 'system' ? 'system' : '');
    sender.textContent = '[' + msg.sender + ']';
    div.appendChild(sender);
  }
  const body = document.createElement('span');
  body.className = 'body ' + msg.type;
  body.textContent = msg.body;
  div.appendChild(body);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function appendDivider(text) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg-divider';
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function renderOnlineUsers() {
  const el = document.getElementById('online-users');
  el.innerHTML = '';
  onlineUsers.forEach(u => {
    const div = document.createElement('div');
    div.className = 'online-user';
    div.innerHTML = '<div class="dot-sm"></div>' + u;
    div.onclick = () => { openPrivate(u); closeSidebar(); };
    el.appendChild(div);
  });
}

function addDMTab(user) {
  const list = document.getElementById('dm-list');
  if (document.getElementById('dm-' + user)) return;
  const div = document.createElement('div');
  div.className = 'sidebar-item';
  div.id = 'dm-' + user;
  div.innerHTML = '<span class="prefix">@</span> ' + user;
  div.onclick = () => { openPrivate(user); closeSidebar(); };
  list.appendChild(div);
}

function openPrivate(target) {
  mode = 'private';
  privateTarget = target;
  document.getElementById('chat-title').textContent = '@ ' + target;
  document.getElementById('private-back').style.display = 'block';
  document.getElementById('tab-public').classList.remove('active');
  if (document.getElementById('dm-' + target)) document.getElementById('dm-' + target).classList.add('active');
  addDMTab(target);
  const el = document.getElementById('messages');
  el.innerHTML = '';
  appendDivider('── private chat with ' + target + ' ──');
  if (privateHistories[target]) privateHistories[target].forEach(m => appendMsg(m, 'private'));
  ws.send('HISTORY:' + target);
  closeMobilePanel();
  setActiveNav('dms');
}

function switchToPublic() {
  mode = 'public';
  privateTarget = '';
  document.getElementById('chat-title').textContent = '# public';
  document.getElementById('private-back').style.display = 'none';
  document.getElementById('tab-public').classList.add('active');
  document.querySelectorAll('#dm-list .sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('messages');
  el.innerHTML = '';
  appendDivider('── public chat ──');
  publicHistory.forEach(m => appendMsg(m, 'public'));
  el.scrollTop = el.scrollHeight;
  closeMobilePanel();
  setActiveNav('public');
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !ws) return;
  input.value = '';

  if (text === '/list') { ws.send('LIST:'); return; }
  if (text.startsWith('/msg ')) { const t = text.slice(5).trim(); if (t) openPrivate(t); return; }

  if (mode === 'private') {
    ws.send('PRIVATE:' + privateTarget + ':' + text);
  } else {
    ws.send('[' + username + ']: ' + text);
  }
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function setActiveNav(tab) {
  document.querySelectorAll('.bnav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('bnav-' + tab);
  if (el) el.classList.add('active');
  if (tab === 'dms') {
    dmUnread = 0;
    const badge = document.getElementById('dm-badge');
    badge.textContent = '';
    badge.classList.remove('show');
  }
}

function toggleMobilePanel(type) {
  const panel = document.getElementById('mobile-panel');
  const content = document.getElementById('mobile-panel-content');

  if (activeMobilePanel === type && panel.classList.contains('open')) {
    closeMobilePanel();
    return;
  }

  activeMobilePanel = type;
  content.innerHTML = '';

  if (type === 'dms') {
    const label = document.createElement('div');
    label.className = 'panel-label';
    label.textContent = 'DIRECT MESSAGES';
    content.appendChild(label);

    if (Object.keys(privateHistories).length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text-muted);font-size:12px;padding:8px;';
      empty.textContent = 'No DMs yet. Tap a user in ONLINE to start.';
      content.appendChild(empty);
    }

    Object.keys(privateHistories).forEach(user => {
      const item = document.createElement('div');
      item.className = 'panel-item';
      item.innerHTML = '<span style="color:var(--text-muted)">@</span> ' + user;
      item.onclick = () => openPrivate(user);
      content.appendChild(item);
    });
  }

  if (type === 'online') {
    const label = document.createElement('div');
    label.className = 'panel-label';
    label.textContent = 'ONLINE USERS';
    content.appendChild(label);
    onlineUsers.forEach(u => {
      const item = document.createElement('div');
      item.className = 'panel-item';
      item.innerHTML = '<div class="dot-sm" style="width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;"></div>' + u;
      item.onclick = () => openPrivate(u);
      content.appendChild(item);
    });
  }

  panel.classList.add('open');
}

function closeMobilePanel() {
  activeMobilePanel = null;
  document.getElementById('mobile-panel').classList.remove('open');
}

document.addEventListener('click', e => {
  const panel = document.getElementById('mobile-panel');
  const bnav = document.getElementById('bottom-nav');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !bnav.contains(e.target)) {
    closeMobilePanel();
  }
});

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-error').style.display = 'none';
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = '> ERROR: ' + msg;
  el.style.display = 'block';
}

function validateUsername(u) {
  if (u.length < 3) return 'Must be at least 3 characters';
  if (u.length > 20) return 'Must be at most 20 characters';
  if (/\s/.test(u)) return 'Cannot contain spaces';
  return null;
}

function validateContact(c) {
  if (c.includes('@')) {
    if (c.length > 254 || /\s/.test(c)) return 'Invalid email format';
    const parts = c.split('@');
    if (parts.length !== 2 || !parts[0] || !parts[1].includes('.')) return 'Invalid email format';
    return null;
  } else {
    if (!/^\d{7,15}$/.test(c)) return 'Phone: digits only, 7-15 digits';
    return null;
  }
}

function waitForAuth() {
  return new Promise(resolve => { authOKResolver = resolve; });
}

async function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  if (!u || !p) { showAuthError('Fill in all fields'); return; }
  document.getElementById('auth-error').style.display = 'none';
  ws.send('LOGIN:' + u + ':' + p);
  const result = await waitForAuth();
  if (result) enterChat(result.username, result.msg);
}

async function doRegister() {
  const u = document.getElementById('reg-username').value.trim();
  const c = document.getElementById('reg-contact').value.trim();
  const p = document.getElementById('reg-password').value;
  const uErr = validateUsername(u);
  const cErr = validateContact(c);
  const pErr = p.length < 6 ? 'Must be at least 6 characters' : null;
  document.getElementById('err-username').textContent = uErr || '';
  document.getElementById('err-username').style.display = uErr ? 'block' : 'none';
  document.getElementById('err-contact').textContent = cErr || '';
  document.getElementById('err-contact').style.display = cErr ? 'block' : 'none';
  document.getElementById('err-password').textContent = pErr || '';
  document.getElementById('err-password').style.display = pErr ? 'block' : 'none';
  if (uErr || cErr || pErr) return;
  ws.send('REGISTER:' + u + ':' + c + ':' + p);
  const result = await waitForAuth();
  if (result) enterChat(result.username, result.msg);
}

function enterChat(uname, welcomeMsg) {
  username = uname;
  authOKResolver = null;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-display').textContent = '[ ' + username + ' ]';
  onlineUsers.add(username);
  renderOnlineUsers();
  ws.send('LIST:');
  appendDivider('── connected as ' + username + ' ──');
  document.getElementById('msg-input').focus();
}

function showNotification(msg) {
  const el = document.createElement('div');
  el.className = 'notification';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

boot();
</script>
</body>
</html>
